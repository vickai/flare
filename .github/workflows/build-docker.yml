name: Build and Push Docker Image

# 配置手动触发
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '镜像版本号'
        required: true
        default: '0.1.1'

env:
  # 你指定的镜像名称
  IMAGE_NAME: flare-vickai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # 赋予向 GitHub Packages (GHCR) 推送镜像的权限
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub 容器镜像仓库 (GHCR)
      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 将 GitHub 用户名自动转为小写（Docker 命名规范要求）
      - name: Lowercase Repository Owner
        run: |
          echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/manual/Dockerfile.amd64
          platforms: linux/amd64
          push: true
          provenance: false
          # 传入 Dockerfile 第一行需要的 ARG 变量
          build-args: |
            FLARE_BASE_IMAGE=golang:alpine
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version_tag }}
            ghcr.io/${{ env.REPO_OWNER }}/${{ env.IMAGE_NAME }}:latest